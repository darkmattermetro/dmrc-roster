<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMRC Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16162a); min-height: 100vh; color: #fff; padding: 20px; }
        h1 { text-align: center; color: #ff6b35; margin: 20px 0; }
        .card { background: #1E1E32; border-radius: 15px; padding: 20px; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .btn { width: 100%; padding: 15px; background: #ff6b35; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        select, input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: none; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 10px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; text-align: center; background: #1E1E32; cursor: pointer; font-size: 12px; }
        .tab.active { background: #ff6b35; color: #000; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        .stat { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; color: #ff6b35; }
        .stat-label { font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <h1>⚙️ ADMIN PANEL</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('dash')">DASHBOARD</div>
        <div class="tab" onclick="showTab('upload')">UPLOAD</div>
    </div>
    
    <div id="dash" class="content active">
        <div class="card">
            <div class="stat">
                <div class="stat-card"><div class="stat-num" id="total">0</div><div class="stat-label">TOTAL ROWS</div></div>
                <div class="stat-card"><div class="stat-num" id="duties">0</div><div class="stat-label">UNIQUE DUTIES</div></div>
            </div>
            <button class="btn" onclick="loadStats()">🔄 REFRESH</button>
        </div>
    </div>
    
    <div id="upload" class="content">
        <div class="card">
            <select id="dayType">
                <option value="weekday">Weekday</option>
                <option value="saturday">Saturday</option>
                <option value="sunday">Sunday</option>
                <option value="special">Special</option>
            </select>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn" onclick="uploadCSV()">📤 UPLOAD CSV</button>
            <p id="msg" style="text-align:center;margin-top:10px;"></p>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://pmjiopmuvkkwsaurtzjo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtamlvcG11dmtrd3NhdXJ0empvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE2MDQsImV4cCI6MjA5MTk4NzYwNH0.br5RGBnFW3E2D16qKxRrvPhcwL3wStZtf21ARzAf_NA';

    function showTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelector('[onclick="showTab(\''+id+'\')"]').classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    async function loadStats() {
        let total = 0, duties = new Set();
        for (const type of ['weekday','saturday','sunday','special']) {
            try {
                const r = await fetch(SUPABASE_URL+'/rest/v1/'+type+'?select=id,duty_no', {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
                });
                const d = await r.json();
                if (d) { total += d.length; d.forEach(x => duties.add(x.duty_no)); }
            } catch(e) {}
        }
        document.getElementById('total').innerText = total;
        document.getElementById('duties').innerText = duties.size;
    }

    async function uploadCSV() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) { document.getElementById('msg').innerText = 'Select a CSV file!'; return; }
        
        document.getElementById('msg').innerText = 'Uploading...';
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const rows = text.split('\n').map(r => r.split(','));
            
            const cols = rows[0].map(c => c.trim().toLowerCase().replace(/ /g,'_'));
            const data = rows.slice(1).filter(r => r.length > 1).map(row => {
                const obj = {};
                cols.forEach((c, i) => { obj[c] = row[i] ? row[i].trim() : ''; });
                return obj;
            }).filter(r => r.duty_no);

            const dayType = document.getElementById('dayType').value;
            const table = 'duties_'+dayType;
            
            try {
                await fetch(SUPABASE_URL+'/rest/v1/'+table+'?id=gt.0', {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
                });

                for (let i = 0; i < data.length; i += 50) {
                    const batch = data.slice(i, i + 50);
                    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
                        body: JSON.stringify(batch)
                    });
                    if (!r.ok) throw new Error(await r.text());
                }
                
                document.getElementById('msg').innerText = '✅ Uploaded '+data.length+' rows!';
                loadStats();
            } catch(err) {
                document.getElementById('msg').innerText = '❌ Error: ' + err.message;
            }
        };
        reader.readAsText(file);
    }

    loadStats();
    </script>
</body>
</html>
