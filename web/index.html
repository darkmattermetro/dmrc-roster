<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DMRC Line 7 Roster Master - Duty Finder for KKDA & PBGW Crew Control">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMRC Roster">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <title>DMRC Line 7 Roster Master</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a2e;
    }
    .loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-logo {
      width: 80px;
      height: 80px;
      border: 3px solid #00d4ff;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      margin-bottom: 20px;
    }
    .loading-text {
      color: #00d4ff;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
    }
    .loading-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 4px;
      margin-top: 8px;
    }
    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(0,212,255,0.3);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 30px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-logo">🚇</div>
    <div class="loading-text">DMRC LINE 7</div>
    <div class="loading-sub">ROSTER MASTER</div>
    <div class="loading-spinner"></div>
  </div>
  
  <script>
    window.addEventListener('load', function() {
      var loading = document.getElementById('loading');
      loading.style.display = 'none';
    });
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(registration) {
          console.log('SW registered:', registration.scope);
        }).catch(function(error) {
          console.log('SW registration failed:', error);
        });
      });
    }
  </script>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
